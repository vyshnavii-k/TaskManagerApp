
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="auth-view" class="card">
            <h2 id="auth-title">Login to Tasks</h2>
            <p id="auth-message" class="message"></p>

            <form id="auth-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" required placeholder="Enter username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Enter password">
                </div>
                <button type="submit" id="auth-btn">Sign In</button>
            </form>

            <p class="toggle-text">
                <span id="auth-toggle-link" onclick="toggleAuthMode()">Don't have an account? Register</span>
            </p>
        </div>

        <div id="dashboard-view" class="card hidden">
            <div class="dashboard-header">
                <h3>Welcome, <span id="user-display"></span>!</h3>
                <button onclick="logout()" class="btn-logout">Logout</button>
            </div>

            <h2>My Tasks</h2>
            <p id="task-message" class="message"></p>

            <form id="task-form" class="task-input-group">
                <input type="text" id="task-input" required placeholder="Add a new assignment or task...">
                <button type="submit">Add</button>
            </form>

            <ul id="task-list">
                </ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
